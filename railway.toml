# Railway — deploy del submódulo backend (repo standalone)
# Guía: DEPLOY_RAILWAY.md
#
# En Railway: conecta el repo del submódulo backend, Root Directory = /

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.py", "pyproject.toml", "uv.lock"]

[deploy]
healthcheckPath = "/api/v1/docs/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "sh -c 'uv run gunicorn core.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers ${GUNICORN_WORKERS:-2} --timeout ${GUNICORN_TIMEOUT:-120} --access-logfile - --error-logfile -'"
