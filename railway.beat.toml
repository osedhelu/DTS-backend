# Railway — Celery beat (mismo repo/imagen que DTS-backend)
# Guía: DEPLOY_RAILWAY.md → sección Celery
#
# En Railway (servicio DTS-celery-beat):
#   Settings → Config file path → /railway.beat.toml
#   Networking → sin dominio público
#   Replicas → 1 (nunca escalar beat)
#   Variables → RUN_MIGRATIONS=false + mismas que API
#   Opcional: volumen en /tmp para persistir celerybeat-schedule

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.py", "pyproject.toml", "uv.lock"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "uv run celery -A core beat --loglevel=info --schedule /tmp/celerybeat-schedule"
